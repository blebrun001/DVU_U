name: Windows Unsigned NSIS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-nsis:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      DVU_TARGET_DIR: ${{ github.workspace }}/src-tauri/target
      CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Windows NSIS installer
        run: npm run tauri:build -- --bundles nsis

      - name: Validate NSIS artifact exists
        shell: bash
        run: |
          ls -lah "${DVU_TARGET_DIR}/release/bundle/nsis"
          find "${DVU_TARGET_DIR}/release/bundle/nsis" -maxdepth 1 -type f -name '*.exe'

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: dvu_u-windows-nsis
          path: ${{ env.DVU_TARGET_DIR }}/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DVU_TARGET_DIR }}/release/bundle/nsis/*.exe
          generate_release_notes: true
