name: macOS Unsigned DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos-dmg:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build macOS app bundle
        run: npm run tauri:build -- --bundles app

      - name: Package unsigned macOS DMG
        run: npm run package:macos:unsigned

      - name: Validate DMG artifact exists
        run: |
          ls -lah src-tauri/target/release/bundle/dmg
          find src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg'

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dataverse-heavy-uploader-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
